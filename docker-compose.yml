version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolweb-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: schoolweb123
      POSTGRES_DB: schoolweb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
